name: soc-incident-response
version: "1.0.0"
author: "Purab Dansingani"
description: "A real-world cybersecurity environment where an AI agent acts as a SOC analyst to triage, isolate, and mitigate an active server breach based on system logs."
tags: ["cybersecurity", "soc", "log-analysis", "incident-response"]
entrypoint: "environment:SOCEnv"
tasks:
  - id: "easy"
    name: "Brute Force Triage"
    description: "Identify the compromised IP address from the auth logs."
    difficulty: "easy"
    grader: "tasks.easy.grader:grade"
  - id: "medium"
    name: "DDoS Mitigation"
    description: "Identify the compromised IP, block it, and isolate the infected service."
    difficulty: "medium"
    grader: "tasks.medium.grader:grade"
  - id: "hard"
    name: "Full Incident Response"
    description: "Trace lateral movement, isolate infected services, block the IP, and submit a firewall mitigation rule."
    difficulty: "hard"
    grader: "tasks.hard.grader:grade"