name: soc-incident-response
version: "1.0.0"
author: "Aryan Rajendra Dalvi"
description: "A cybersecurity SOC analyst simulation for triaging and mitigating server breaches."
tags: ["cybersecurity", "soc", "incident-response"]
entrypoint: "environment:SOCEnv"
tasks:
  - id: "easy"
    name: "Brute Force Triage"
    description: "Identify attacking IP from auth logs and block it using block_ip."
    difficulty: "easy"
    grader: "tasks.easy.grader:grade"
  - id: "medium"
    name: "DDoS Mitigation"
    description: "Detect high CPU usage caused by a DDoS, block malicious IP, and restore service."
    difficulty: "medium"
    grader: "tasks.medium.grader:grade"
  - id: "hard"
    name: "Full Incident Response"
    description: "Stop a brute force attack and kill a ransomware process on database server before files are encrypted."
    difficulty: "hard"
    grader: "tasks.hard.grader:grade"